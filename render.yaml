# Render 部署配置文件
services:
  # 后端服务
  - type: web
    name: etf-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///fund_arb.db
      - key: FANGTANG_KEY
        sync: false
    healthCheckPath: /api/test
