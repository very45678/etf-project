[phases.setup]
nixPkgs = ["python39", "python39Packages.pip"]

[phases.install]
cmds = [
    "cd backend && PIP_BREAK_SYSTEM_PACKAGES=1 pip install -r requirements.txt --user"
]

[phases.build]
cmds = ["echo 'Build completed'"]

[start]
cmd = "cd backend && gunicorn api:app --bind 0.0.0.0:$PORT --timeout 120"
