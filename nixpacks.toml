[phases.setup]
nixPkgs = ["python39", "python39Packages.pip", "python39Packages.virtualenv"]

[phases.install]
cmds = [
    "cd backend && python -m venv venv",
    "cd backend && source venv/bin/activate && pip install --upgrade pip",
    "cd backend && source venv/bin/activate && pip install -r requirements.txt"
]

[phases.build]
cmds = ["echo 'Build completed'"]

[start]
cmd = "cd backend && source venv/bin/activate && gunicorn api:app --bind 0.0.0.0:$PORT --timeout 120"
